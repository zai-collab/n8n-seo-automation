{% extends "base.html" %}
{% block title %}Edit Blog{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header">
    <h1 class="section-title">Edit Blog</h1>
  </div>

  <form method="post">
    {% csrf_token %}

    <div class="form-group">
      <label class="label" for="title">Title</label>
      <input id="title" type="text" name="title" value="{{ blog.title|default_if_none:'' }}" required>
    </div>

    <div class="form-group">
      <label class="label" for="slug">Slug</label>
      <input id="slug" type="text" name="slug" value="{{ blog.slug|default_if_none:'' }}" required placeholder="url-friendly-slug">
    </div>

    <div class="form-group">
      <label class="label" for="content_html">Content</label>
      <textarea id="content_html" name="content_html" rows="12" placeholder="HTML content">{{ blog.content_html|default_if_none:'' }}</textarea>
    </div>

    <div class="form-group">
      <label class="label" for="featured_image_alt">Image Alt</label>
      <input id="featured_image_alt" type="text" name="featured_image_alt" value="{{ blog.featured_image_alt|default_if_none:'' }}" placeholder="Alt text">
    </div>

    <div class="row">
      <button class="btn primary" type="submit">Save</button>
      <a class="btn secondary" href="{% url 'post:blog_list' %}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
