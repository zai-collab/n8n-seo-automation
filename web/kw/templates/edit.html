{% extends "base.html" %}
{% block title %}Edit Keyword{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header">
    <h1 class="section-title">Edit Keyword</h1>
  </div>

  <form method="post">
    {% csrf_token %}

    <div class="form-group">
      <label class="label" for="seed_keyword">Seed keyword</label>
      <input id="seed_keyword" type="text" name="seed_keyword" value="{{ keyword.seed_keyword|default_if_none:'' }}" disabled>
    </div>

    <div class="form-group">
      <label class="label" for="keyword">Keyword</label>
      <input id="keyword" type="text" name="keyword" value="{{ keyword.keyword|default_if_none:'' }}" required>
    </div>

    <div class="form-group">
      <label class="label" for="search_volume">Search Volume</label>
      <input id="search_volume" type="number" name="search_volume" value="{{ keyword.search_volume|default_if_none:0 }}" min="0" step="1">
    </div>

    <div class="form-group">
      <label class="label" for="cpc">CPC</label>
      <input id="cpc" type="number" step="0.01" name="cpc" value="{{ keyword.cpc|default_if_none:0 }}" min="0">
    </div>

    <div class="form-group">
      <label class="label" for="competition">Competition</label>
      <input id="competition" type="number" step="0.01" name="competition" value="{{ keyword.competition|default_if_none:0 }}" min="0">
    </div>

    <div class="form-group">
      <label class="label" for="keyword_difficulty">Keyword Difficulty</label>
      <input id="keyword_difficulty" type="number" step="0.01" name="keyword_difficulty" value="{{ keyword.keyword_difficulty|default_if_none:0 }}" min="0">
    </div>

    <div class="form-group">
      <label class="label" for="search_intent">Search Intent</label>
      <input id="search_intent" type="text" name="search_intent" value="{{ keyword.search_intent|default_if_none:'' }}" placeholder="e.g. informational, navigational, transactional">
    </div>

    <div class="row">
      <button class="btn primary" type="submit">Save</button>
      <a class="btn secondary" href="{% url 'kw:keyword_list' %}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
