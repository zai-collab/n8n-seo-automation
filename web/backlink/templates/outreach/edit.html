{% extends "base.html" %}
{% block title %}Edit Outreach{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header">
    <h1 class="section-title">Edit Outreach</h1>
  </div>

  <form method="post">
    {% csrf_token %}

    <div class="form-group">
      <label class="label">Content</label>
      <input type="text" value="{% firstof outreach.content.title outreach.content.backlink.domain_from outreach.content.backlink.url_from '-' %}" disabled class="muted" style="background: var(--bg-elevated); padding: 10px 14px; border-radius: var(--radius); border: 1px solid var(--line);">
    </div>

    <div class="form-group">
      <label class="label" for="subject">Subject</label>
      <input id="subject" type="text" name="subject" value="{{ outreach.subject|default_if_none:'' }}" placeholder="Email subject">
    </div>

    <div class="form-group">
      <label class="label" for="body">Body</label>
      <textarea id="body" name="body" rows="12" placeholder="Outreach email body">{{ outreach.body|default_if_none:'' }}</textarea>
    </div>

    <div class="row">
      <button class="btn primary" type="submit">Save</button>
      <a class="btn secondary" href="{% url 'backlink:outreach_list' %}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
